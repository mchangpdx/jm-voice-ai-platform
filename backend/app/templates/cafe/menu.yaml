# Cafe vertical — default menu template (25 items).
# (Cafe vertical default 메뉴 템플릿 — 25개 아이템)
#
# Source: JM Cafe production catalog (2026-05-07 redesign).
# Pattern: PDX fast-casual cafes (Stumptown / Coava / Heart-style).
# Customization: Operator adjusts prices + adds house specials via
# Admin UI Wizard. Allergens are FDA-9 aligned with "wheat" + "peanuts"
# (added Phase 5 #8 fix).
#
# Schema notes:
# - base_price = 12oz / Small (base for size deltas in modifier_groups.yaml)
# - sizes = applicable size codes (omitted for non-sized items like pastries)
# - base_allergens = allergens present in the base recipe (modifier add/remove
#   layered at runtime — see modifier_groups.yaml allergen_add/remove)

vertical: cafe
default_lang: en
supported_langs: [en, es, ko, ja, zh]

categories:
