# Beauty vertical вҖ” Phase 6 layer (scheduler model).
# (Beauty вҖ” stylist-bound slot лӘЁлҚё. 9-layer spec В§6 schema.)
#
# Slot binding is per-stylist (capacity=1 per chair). list_stylists tool
# reads `resources` directly. menu_items.duration_min on each service row
# decides how long a slot is held.
#
# Resources are seed defaults вҖ” a real salon overrides via Admin UI
# Wizard after onboarding. specialties values match menu.yaml item ids.

slot_kind: stylist
default_duration_min: 45
duration_buckets: [30, 45, 60, 90, 120, 180]
opening_block_min: 15
buffer_min: 10
advance_booking_limit_days: 60

