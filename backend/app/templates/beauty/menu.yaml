# Beauty vertical — default service catalog (18 services).
# (Beauty vertical default 서비스 카탈로그 — 18 services across 5 categories)
#
# Source: composite of mid-tier salon menus across PDX / LA / NYC.
# Operator adjusts prices + adds house specials via Admin UI Wizard.
# Each item carries duration_min so book_appointment can hold the slot
# and service_lookup can quote both price and time.
#
# Schema notes:
# - service_kind is set on every row (this is a service vertical).
# - duration_min is REQUIRED — Phase 1 catalog validator warns when null.
# - base_price is a starting quote; final price may shift for hair length
#   (handled in modifier_groups.yaml).

