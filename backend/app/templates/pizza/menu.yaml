# Pizza vertical — default menu template (24 items: NY-style pizzeria).
# (Pizza vertical default 메뉴 템플릿 — 24개, JM KBBQ 84개 대비 simpler)
#
# Source: Atlas Pizza (PDX, 3 locations) — NY-style slices + whole pies.
# Pattern: Independent NY-style pizzeria FSR.
# Customization: Operator adjusts prices + adds house specials via
# Admin UI Wizard. Allergens are FDA-9 aligned with pizza-specific
# patterns (pepperoni/sausage → pork for halal/kosher; meatball →
# housemade with egg + dairy binder).
#
# Schema notes:
#   base_price  = 14" whole pie price (USD).
#   size +$8 via modifier_groups: size (14" → 18").
#   modifier_groups required: size, crust, cheese (for pies).
#   slices have NO size/crust modifier (fixed single slice).
#   build_your_own additionally requires: sauce.

vertical: pizza
default_lang: en
supported_langs: [en, es]   # EN + 1 native per multilingual_policy memo (2026-05-07)

categories:
  - id: signature_pie
    en: Signature Pies (Whole)
    desc: "House signature whole pies — 14\" base, 18\" available"
  - id: classic_pie
    en: Classic Pies (Whole)
    desc: "Cheese, Pepperoni, Sausage, White Pizza"
  - id: slice
    en: Slices
    desc: "Daily slices — 1 cheese, 1 pepperoni always available"
  - id: build_your_own
    en: Build Your Own Pizza
    desc: "Choose crust, sauce, cheese, toppings"
  - id: salad
    en: Salads
    desc: "Caesar, House, Caprese"
  - id: side
    en: Sides
    desc: "Garlic knots, breadsticks, wings"
  - id: dessert
    en: Desserts
    desc: "Brownies, cookies"
  - id: drink
    en: Drinks
    desc: "Soda (12oz can)"


