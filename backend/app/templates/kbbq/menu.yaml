# KBBQ vertical — default menu template (84 items: 77 menu + 7 sides).
# (KBBQ vertical default 메뉴 템플릿 — 77개 메인 + 7개 사이드)
#
# Source: 장충동 JCD K-Barbecue PDF rebranded to JM Korean BBQ.
# Pattern: PDX Korean BBQ FSR (full-service restaurant).
# Customization: Operator adjusts prices + adds house specials via
# Admin UI Wizard. Allergens are FDA-9 aligned with KBBQ-specific
# patterns (kimchi → shellfish/fish, soondae → pork/wheat).
#
# Schema notes:
# - base_price = single-portion price (USD).
# - serves = informational only (Hot Pot for 2 people, etc).
# - rules = business rules enforced by voice agent (POS does not enforce).
# - add_on_options = inline price-delta variants (Tteokbokki +Ramen, etc).
#   Loyverse stores these as separate variants; voice agent surfaces
#   them as add-on modifiers.

vertical: kbbq
default_lang: en
supported_langs: [en, ko]   # KO+EN only per multilingual_policy memo (2026-05-07)

categories:
  - id: appetizer
    en: Appetizers
    ko: 안주
  - id: shareable
    en: Shareable Plate
    ko: 공유 메뉴
